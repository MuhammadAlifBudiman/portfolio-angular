name: 🐞 Bug Fix
description: Report a defect with reproduction, expected behavior, and verification criteria
title: "[BUG]: <title>"
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      render: true
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Fix acceptance criteria
    validations:
      required: true
  - type: textarea
    id: verification-plan
    attributes:
      label: Verification plan
    validations:
      required: true

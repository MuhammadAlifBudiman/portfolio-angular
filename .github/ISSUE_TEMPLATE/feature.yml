name: ✨ Spec-Tracked Feature
description: Request or implement a feature that must be mapped to a product specification
title: "[FEAT]: <title>"
labels: ["feature", "enhancement"]
body:
  - type: input
    id: feature-id
    attributes:
      label: Feature ID
      description: Use an existing ID from docs/product/FEATURE_SPEC.md or write NEW if this requires spec intake.
      placeholder: "F001"
    validations:
      required: true
  - type: textarea
    id: user-problem
    attributes:
      label: User problem / goal
      description: Describe the user problem and expected outcome. Do not include implementation details here.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Reference existing AC IDs or write new Given/When/Then criteria.
      placeholder: "AC-F001-1: Given..., When..., Then..."
    validations:
      required: true
  - type: textarea
    id: clarification
    attributes:
      label: Clarifications / open questions
      description: Use [NEEDS CLARIFICATION] for unresolved behavior.
    validations:
      required: false
  - type: textarea
    id: verification-plan
    attributes:
      label: Verification plan
      description: Commands, UAT cases, accessibility checks, and manual browser checks required before PR.
      placeholder: "npm run build; npm test; UAT case IDs"
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution (optional)
      description: Implementation notes only after the requirement is clear.
    validations:
      required: false

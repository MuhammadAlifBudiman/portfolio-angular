name: Sync Resume from cv-latex

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - cv-latex-updated

permissions:
  contents: write

jobs:
  sync-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Update cv-latex submodule to origin/main
        run: |
          git -C external/cv-latex fetch origin main
          git -C external/cv-latex checkout origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            make latexmk texlive-latex-extra texlive-fonts-recommended \
            texlive-lang-english texlive-lang-other lmodern chktex poppler-utils imagemagick

      - name: Inject environment variables
        run: |
          cp src/environments/example.environment.ts src/environments/environment.ts
          node scripts/write-prod-env.js
        env:
          ENV_SERVICE_ID: ${{ secrets.ENV_SERVICE_ID }}
          ENV_TEMPLATE_ID: ${{ secrets.ENV_TEMPLATE_ID }}
          ENV_PUBLIC_KEY: ${{ secrets.ENV_PUBLIC_KEY }}

      - name: Sync resume from cv-latex
        run: npm run resume:sync

      - name: Run unit tests
        run: npm run test:ci

      - name: Build production output
        run: npm run build

      - name: Validate prerender output
        run: npm run prerender:check

      - name: Commit synced resume
        id: commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          if git diff --quiet -- .gitmodules external/cv-latex public/resume.pdf; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No resume changes to commit."
          else
            git add .gitmodules external/cv-latex public/resume.pdf
            git commit -m "chore: sync resume from cv-latex"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export NG_CLI_ANALYTICS=false
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          npx ng deploy --cname=muhammadalifbudiman.my.id

      - name: Verify gh-pages was updated
        run: |
          git fetch --depth=1 origin gh-pages
          LAST_COMMIT_MESSAGE="$(git log -1 origin/gh-pages --pretty=%B)"
          VERIFY_SHA="$(git rev-parse HEAD)"

          case "$LAST_COMMIT_MESSAGE" in
            *"$VERIFY_SHA"*)
              echo "Verified gh-pages update for $VERIFY_SHA"
              ;;
            *)
              echo "::error::gh-pages was not updated for commit $VERIFY_SHA"
              echo "Latest gh-pages commit message:"
              echo "$LAST_COMMIT_MESSAGE"
              exit 1
              ;;
          esac

name: Deploy using ng deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Assert deploy token present
        env:
          GH_TOKEN_SECRET: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN_SECRET" ]; then
            echo "::error::secrets.GH_TOKEN is empty. Rotate the PAT (repo scope, access to private cv-latex) and update the GH_TOKEN secret: gh secret set GH_TOKEN --repo MuhammadAlifBudiman/portfolio-angular"
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            make latexmk texlive-latex-extra texlive-fonts-recommended \
            texlive-lang-english texlive-lang-other lmodern chktex poppler-utils imagemagick

      - name: Inject environment variables
        run: |
          cp src/environments/example.environment.ts src/environments/environment.ts
          node scripts/write-prod-env.js
        env:
          ENV_SERVICE_ID: ${{ secrets.ENV_SERVICE_ID }}
          ENV_TEMPLATE_ID: ${{ secrets.ENV_TEMPLATE_ID }}
          ENV_PUBLIC_KEY: ${{ secrets.ENV_PUBLIC_KEY }}

      - name: Sync resume from cv-latex
        run: npm run resume:sync

      - name: Run unit tests
        run: npm run test:ci

      - name: Build production output
        run: npm run build

      - name: Validate prerender output
        run: npm run prerender:check

      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export NG_CLI_ANALYTICS=false
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          npx ng deploy --cname=muhammadalifbudiman.my.id

      - name: Verify gh-pages was updated
        run: |
          git fetch --depth=1 origin gh-pages
          LAST_COMMIT_MESSAGE="$(git log -1 origin/gh-pages --pretty=%B)"

          case "$LAST_COMMIT_MESSAGE" in
            *"$GITHUB_SHA"*)
              echo "Verified gh-pages update for $GITHUB_SHA"
              ;;
            *)
              echo "::error::gh-pages was not updated for commit $GITHUB_SHA"
              echo "Latest gh-pages commit message:"
              echo "$LAST_COMMIT_MESSAGE"
              exit 1
              ;;
          esac

name: Deploy using ng deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Inject environment variables
        run: |
          cp src/environments/example.environment.ts src/environments/environment.ts
          echo "export const environment = { production: true, emailService: { serviceId: '$ENV_SERVICE_ID', templateId: '$ENV_TEMPLATE_ID', publicKey: '$ENV_PUBLIC_KEY' } };" > src/environments/environment.prod.ts
        env:
          ENV_SERVICE_ID: ${{ secrets.ENV_SERVICE_ID }}
          ENV_TEMPLATE_ID: ${{ secrets.ENV_TEMPLATE_ID }}
          ENV_PUBLIC_KEY: ${{ secrets.ENV_PUBLIC_KEY }}

      - name: Build & Deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export NG_CLI_ANALYTICS=false
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          npx ng deploy --cname=muhammadalifbudiman.my.id

      - name: Verify gh-pages was updated
        run: |
          git fetch --depth=1 origin gh-pages
          LAST_COMMIT_MESSAGE="$(git log -1 origin/gh-pages --pretty=%B)"

          case "$LAST_COMMIT_MESSAGE" in
            *"$GITHUB_SHA"*)
              echo "Verified gh-pages update for $GITHUB_SHA"
              ;;
            *)
              echo "::error::gh-pages was not updated for commit $GITHUB_SHA"
              echo "Latest gh-pages commit message:"
              echo "$LAST_COMMIT_MESSAGE"
              exit 1
              ;;
          esac

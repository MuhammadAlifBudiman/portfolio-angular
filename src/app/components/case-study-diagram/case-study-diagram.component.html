<figure class="mb-0">
  <div
    class="diagram-scroll overflow-x-auto rounded-xl border"
  >
    @switch (diagramId) {
      @case ('bkn-arch') { <ng-container *ngTemplateOutlet="bknArchSvg" /> }
      @case ('bkn-flow') { <ng-container *ngTemplateOutlet="bknFlowSvg" /> }
      @case ('blog-arch') { <ng-container *ngTemplateOutlet="blogArchSvg" /> }
      @case ('patient-workflow') { <ng-container *ngTemplateOutlet="patientWorkflowSvg" /> }
      @case ('taskmaster-flow') { <ng-container *ngTemplateOutlet="taskmasterFlowSvg" /> }
      @case ('portfolio-arch') { <ng-container *ngTemplateOutlet="portfolioArchSvg" /> }
    }
  </div>

  <div class="mt-2 flex items-center justify-between">
    @if (item.captionKey) {
      <figcaption class="font-mono text-sm opacity-70">{{ t(item.captionKey) }}</figcaption>
    }
    <button
      #triggerBtn
      type="button"
      class="ml-auto text-xs underline opacity-70 hover:opacity-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2"
      (click)="openFullSize()"
      [attr.aria-label]="t('caseStudies.common.viewFullSize')"
    >{{ t('caseStudies.common.viewFullSize') }}</button>
  </div>

  @if (showFullSize()) {
    <div
      class="diagram-overlay fixed inset-0 z-50 flex items-center justify-center bg-black/80"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="t(item.altKey)"
      (click)="closeFullSize()"
    >
      <div #overlayInner class="diagram-overlay-inner relative max-h-screen w-full max-w-5xl overflow-auto p-4" tabindex="-1" (click)="$event.stopPropagation()" (keydown)="onOverlayKeydown($event)">
        <button
          type="button"
          class="absolute right-4 top-4 z-10 rounded-full bg-white/90 px-3 py-1 text-sm font-medium text-black shadow focus-visible:outline focus-visible:outline-2"
          (click)="closeFullSize()"
          [attr.aria-label]="t('caseStudies.common.closeFullSize')"
        ><span aria-hidden="true">&#x2715;</span></button>
        @switch (diagramId) {
          @case ('bkn-arch') { <ng-container *ngTemplateOutlet="bknArchSvg" /> }
          @case ('bkn-flow') { <ng-container *ngTemplateOutlet="bknFlowSvg" /> }
          @case ('blog-arch') { <ng-container *ngTemplateOutlet="blogArchSvg" /> }
          @case ('patient-workflow') { <ng-container *ngTemplateOutlet="patientWorkflowSvg" /> }
          @case ('taskmaster-flow') { <ng-container *ngTemplateOutlet="taskmasterFlowSvg" /> }
          @case ('portfolio-arch') { <ng-container *ngTemplateOutlet="portfolioArchSvg" /> }
        }
      </div>
    </div>
  }

  <!-- ── SVG Templates ─────────────────────────────────────────── -->

  <!-- BKN Architecture -->
  <ng-template #bknArchSvg>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" role="img" [attr.aria-label]="t(item.altKey)">
      <defs>
        <marker id="arr-bkn-arch" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" class="dg-arrow-head"/>
        </marker>
      </defs>

      <!-- Title -->
      <text x="300" y="28" text-anchor="middle" class="dg-title">{{ t('caseStudies.diagrams.bkn-arch.title') }}</text>

      <!-- Client -->
      <rect x="220" y="50" width="160" height="40" rx="6" class="box"/>
      <text x="300" y="75" text-anchor="middle" class="dg-text">Client</text>

      <!-- Arrow 1 -->
      <line x1="300" y1="90" x2="300" y2="110" class="arrow" marker-end="url(#arr-bkn-arch)"/>

      <!-- Auth / Authz -->
      <rect x="180" y="110" width="240" height="40" rx="6" class="accent-blue"/>
      <text x="300" y="135" text-anchor="middle" class="dg-on-blue">Authentication &amp; Authorization</text>

      <!-- Arrow 2 -->
      <line x1="300" y1="150" x2="300" y2="170" class="arrow" marker-end="url(#arr-bkn-arch)"/>

      <!-- Go API Layer -->
      <rect x="170" y="170" width="260" height="40" rx="6" class="accent-green"/>
      <text x="300" y="195" text-anchor="middle" class="dg-on-green">Go REST API Layer</text>

      <!-- Arrow 3 -->
      <line x1="300" y1="210" x2="300" y2="230" class="arrow" marker-end="url(#arr-bkn-arch)"/>

      <!-- Service Layer -->
      <rect x="180" y="230" width="240" height="40" rx="6" class="box"/>
      <text x="300" y="255" text-anchor="middle" class="dg-text">Service Layer</text>

      <!-- Arrow 4 -->
      <line x1="300" y1="270" x2="300" y2="290" class="arrow" marker-end="url(#arr-bkn-arch)"/>

      <!-- Data Access -->
      <rect x="180" y="290" width="240" height="35" rx="6" class="box"/>
      <text x="300" y="312" text-anchor="middle" class="dg-muted">Data Access &#x2192; Internal Data Source</text>

      <!-- Stack labels right side -->
      <text x="450" y="135" class="dg-muted">Keycloak · RBAC</text>
      <text x="450" y="195" class="dg-muted">Endpoints · Swagger</text>
      <text x="450" y="255" class="dg-muted">Business Logic</text>
      <text x="450" y="312" class="dg-muted">Internal Data Store</text>

      <!-- Anonymized note (moved below Data Access box) -->
      <rect x="8" y="348" width="220" height="18" rx="3" class="anon-badge"/>
      <text x="14" y="361" class="dg-note">Anonymized — no real paths, schema, or domain names</text>
    </svg>
  </ng-template>

  <!-- BKN RBAC Flow -->
  <ng-template #bknFlowSvg>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" role="img" [attr.aria-label]="t(item.altKey)">
      <defs>
        <marker id="arr-bkn-flow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" class="dg-arrow-head"/>
        </marker>
      </defs>

      <text x="300" y="25" text-anchor="middle" class="dg-title">{{ t('caseStudies.diagrams.bkn-flow.title') }}</text>

      <!-- Step 1: Request -->
      <rect x="210" y="40" width="180" height="34" rx="6" class="box"/>
      <text x="300" y="61" text-anchor="middle" class="dg-text">Incoming API Request</text>

      <!-- Arrow -->
      <line x1="300" y1="74" x2="300" y2="94" class="arrow" marker-end="url(#arr-bkn-flow)"/>

      <!-- Step 2: Token check -->
      <rect x="190" y="94" width="220" height="34" rx="6" class="accent-blue"/>
      <text x="300" y="115" text-anchor="middle" class="dg-on-blue">Validate JWT Token</text>

      <!-- Arrow + branch -->
      <line x1="300" y1="128" x2="300" y2="148" class="arrow" marker-end="url(#arr-bkn-flow)"/>
      <!-- Reject branch -->
      <line x1="410" y1="111" x2="480" y2="111" class="arrow" marker-end="url(#arr-bkn-flow)"/>
      <rect x="480" y="97" width="110" height="28" rx="4" class="reject"/>
      <text x="535" y="115" text-anchor="middle" class="dg-danger">401 Unauthorized</text>
      <text x="445" y="108" text-anchor="middle" class="dg-muted">invalid</text>

      <!-- Step 3: Role check -->
      <rect x="190" y="148" width="220" height="34" rx="6" class="accent-green"/>
      <text x="300" y="169" text-anchor="middle" class="dg-on-green">Check Role / Permission</text>

      <!-- Arrow + branch -->
      <line x1="300" y1="182" x2="300" y2="202" class="arrow" marker-end="url(#arr-bkn-flow)"/>
      <!-- Reject branch -->
      <line x1="410" y1="165" x2="480" y2="165" class="arrow" marker-end="url(#arr-bkn-flow)"/>
      <rect x="480" y="151" width="110" height="28" rx="4" class="reject"/>
      <text x="535" y="169" text-anchor="middle" class="dg-danger">403 Forbidden</text>
      <text x="445" y="162" text-anchor="middle" class="dg-muted">no access</text>

      <!-- Step 4: Handler -->
      <rect x="200" y="202" width="200" height="34" rx="6" class="box"/>
      <text x="300" y="223" text-anchor="middle" class="dg-text">Endpoint Handler</text>

      <!-- Arrow -->
      <line x1="300" y1="236" x2="300" y2="252" class="arrow" marker-end="url(#arr-bkn-flow)"/>

      <!-- Step 5: Response -->
      <rect x="210" y="252" width="180" height="22" rx="4" class="box"/>
      <text x="300" y="267" text-anchor="middle" class="dg-muted">200 OK Response</text>

      <!-- Anon note -->
      <rect x="8" y="262" width="190" height="14" rx="3" class="anon-badge"/>
      <text x="14" y="272" class="dg-note">Anonymized conceptual flow</text>
    </svg>
  </ng-template>

  <!-- Blog API Architecture -->
  <ng-template #blogArchSvg>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" [attr.aria-label]="t(item.altKey)">
      <defs>
        <marker id="arr-blog" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" class="dg-arrow-head"/>
        </marker>
      </defs>

      <text x="300" y="24" text-anchor="middle" class="dg-title">{{ t('caseStudies.diagrams.blog-arch.title') }}</text>

      <!-- Routes -->
      <rect x="170" y="40" width="260" height="34" rx="6" class="accent-blue"/>
      <text x="300" y="61" text-anchor="middle" class="dg-on-blue">Express Routes (HTTP entry points)</text>

      <line x1="300" y1="74" x2="300" y2="94" class="arrow" marker-end="url(#arr-blog)"/>

      <!-- Controller + middleware -->
      <rect x="150" y="94" width="300" height="34" rx="6" class="box"/>
      <text x="300" y="115" text-anchor="middle" class="dg-text">Controllers · Auth Middleware · Validation</text>

      <line x1="300" y1="128" x2="300" y2="148" class="arrow" marker-end="url(#arr-blog)"/>

      <!-- Service -->
      <rect x="170" y="148" width="260" height="34" rx="6" class="accent-green"/>
      <text x="300" y="169" text-anchor="middle" class="dg-on-green">Services (Business Logic)</text>

      <line x1="300" y1="182" x2="300" y2="202" class="arrow" marker-end="url(#arr-blog)"/>

      <!-- Models / ORM -->
      <rect x="170" y="202" width="260" height="34" rx="6" class="box"/>
      <text x="300" y="223" text-anchor="middle" class="dg-text">Sequelize ORM Models</text>

      <line x1="300" y1="236" x2="300" y2="256" class="arrow" marker-end="url(#arr-blog)"/>

      <!-- PostgreSQL -->
      <rect x="200" y="256" width="200" height="34" rx="6" class="db"/>
      <text x="300" y="277" text-anchor="middle" class="dg-muted">PostgreSQL Database</text>

      <!-- Side: Email + Logging -->
      <rect x="480" y="148" width="110" height="30" rx="4" class="side"/>
      <text x="535" y="167" text-anchor="middle" class="dg-muted">Email (Nodemailer)</text>
      <line x1="430" y1="165" x2="480" y2="163" class="arrow-dash" marker-end="url(#arr-blog)"/>

      <rect x="480" y="188" width="110" height="30" rx="4" class="side"/>
      <text x="535" y="207" text-anchor="middle" class="dg-muted">Winston Logging</text>
      <line x1="430" y1="200" x2="480" y2="203" class="arrow-dash" marker-end="url(#arr-blog)"/>

      <!-- Stack footer -->
      <text x="300" y="306" text-anchor="middle" class="dg-footer">Node.js · Express · TypeScript · Sequelize · PostgreSQL · JWT · Winston · Nodemailer</text>
    </svg>
  </ng-template>

  <!-- Task Master Reset Flow -->
  <ng-template #taskmasterFlowSvg>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" [attr.aria-label]="t(item.altKey)">
      <defs>
        <marker id="arr-taskmaster" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" class="dg-arrow-head"/>
        </marker>
      </defs>

      <text x="300" y="24" text-anchor="middle" class="dg-title">{{ t('caseStudies.diagrams.taskmaster-flow.title') }}</text>

      <!-- Trigger -->
      <rect x="200" y="42" width="200" height="30" rx="6" class="trigger"/>
      <text x="300" y="61" text-anchor="middle" class="dg-muted">Cron / Management Command</text>

      <line x1="300" y1="72" x2="300" y2="92" class="arrow" marker-end="url(#arr-taskmaster)"/>

      <!-- Timezone check -->
      <rect x="170" y="92" width="260" height="30" rx="6" class="check"/>
      <text x="300" y="111" text-anchor="middle" class="dg-on-blue">Evaluate Task Due Dates (timezone-aware)</text>

      <line x1="300" y1="122" x2="300" y2="142" class="arrow" marker-end="url(#arr-taskmaster)"/>

      <!-- Type branches -->
      <rect x="30" y="142" width="130" height="28" rx="5" class="box"/>
      <text x="95" y="160" text-anchor="middle" class="dg-muted">Daily Tasks</text>

      <rect x="235" y="142" width="130" height="28" rx="5" class="box"/>
      <text x="300" y="160" text-anchor="middle" class="dg-muted">Weekly Tasks</text>

      <rect x="440" y="142" width="130" height="28" rx="5" class="box"/>
      <text x="505" y="160" text-anchor="middle" class="dg-muted">Monthly Tasks</text>

      <!-- Branch arrows from check -->
      <line x1="225" y1="122" x2="95" y2="142" class="arrow" marker-end="url(#arr-taskmaster)"/>
      <line x1="300" y1="122" x2="300" y2="142" class="arrow" marker-end="url(#arr-taskmaster)"/>
      <line x1="375" y1="122" x2="505" y2="142" class="arrow" marker-end="url(#arr-taskmaster)"/>

      <!-- Merge to reset -->
      <line x1="95" y1="170" x2="95" y2="210" class="connector-line"/>
      <line x1="300" y1="170" x2="300" y2="210" class="connector-line"/>
      <line x1="505" y1="170" x2="505" y2="210" class="connector-line"/>
      <line x1="95" y1="210" x2="505" y2="210" class="connector-line"/>

      <line x1="300" y1="250" x2="300" y2="268" class="arrow" marker-end="url(#arr-taskmaster)"/>

      <!-- Log -->

      <text x="300" y="284" text-anchor="middle" class="dg-on-purple">Log Reset Event</text>

      <!-- Stack footer -->
      <text x="300" y="298" text-anchor="middle" class="dg-footer">Django · DRF · PostgreSQL · JWT · drf-yasg · openpyxl</text>
    </svg>
  </ng-template>

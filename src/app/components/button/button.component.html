@if (routerLink) {
  <a
    [routerLink]="routerLink"
    [attr.aria-label]="ariaLabel || null"
    [class]="baseClasses + ' ' + variantClasses"
  >
    @if (variant !== 'text') {
      <div
        class="dark:text-dark-background-primary dark:bg-dark-accent-hover text-light-background-primary bg-light-accent-hover absolute left-0 top-0 -z-[1] h-full w-full translate-y-full transition-transform duration-700 ease-[cubic-bezier(0.19,1,0.22,1)] group-hover/button:translate-y-0"
      ></div>
    }
    <span [class]="spanClasses">{{ buttonText }}</span>
  </a>
} @else if (href) {
  <a
    [href]="href"
    [attr.download]="download || null"
    [attr.aria-label]="ariaLabel || null"
    [attr.target]="newTab ? '_blank' : null"
    [attr.rel]="newTab ? 'noopener noreferrer' : null"
    [class]="baseClasses + ' ' + variantClasses"
  >
    @if (variant !== 'text') {
      <div
        class="dark:text-dark-background-primary dark:bg-dark-accent-hover text-light-background-primary bg-light-accent-hover absolute left-0 top-0 -z-[1] h-full w-full translate-y-full transition-transform duration-700 ease-[cubic-bezier(0.19,1,0.22,1)] group-hover/button:translate-y-0"
      ></div>
    }
    <span [class]="spanClasses">
      {{ buttonText }}
      @if (variant === 'text' && newTab) {
        <!--
          External-link indicator using currentColor so it follows the
          text colour through all themes, hover, and focus states.
          aria-hidden: the anchor's aria-label / button text already describes
          the destination; this icon is decorative only.
        -->
        <svg
          aria-hidden="true"
          viewBox="0 0 16 16"
          class="h-3.5 w-3.5 shrink-0 stroke-current fill-none transition-transform duration-200 group-hover/button:-translate-y-0.5 group-hover/button:translate-x-0.5"
        >
          <path
            d="M5 11 11 5M6 5h5v5"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      }
    </span>
  </a>
} @else {
  <button
    type="button"
    [class]="baseClasses + ' appearance-none ' + variantClasses"
    [disabled]="disabled"
    [attr.aria-disabled]="disabled"
    (click)="onButtonClick()"
  >
    @if (variant !== 'text') {
      <div
        class="dark:text-dark-background-primary dark:bg-dark-accent-hover text-light-background-primary bg-light-accent-hover absolute left-0 top-0 -z-[1] h-full w-full translate-y-full transition-transform duration-700 ease-[cubic-bezier(0.19,1,0.22,1)] group-hover/button:translate-y-0"
      ></div>
    }
    <span [class]="spanClasses">{{ buttonText }}</span>
  </button>
}

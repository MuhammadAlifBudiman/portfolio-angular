<footer
  class="dark:border-dark-border-primary border-light-border-primary dark:text-dark-text-secondary text-light-text-secondary w-full border-t py-6 font-mono text-sm"
>
  <div class="container flex flex-col items-center justify-between gap-4 px-4 sm:flex-row">
    <p>{{ currentYear }} {{ t('footer.copyright') }}</p>
    <div class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2">
      <a
        [href]="links.github"
        target="_blank"
        rel="noopener noreferrer"
        class="dark:text-dark-accent-hover text-light-accent-hover dark:hover:text-dark-accent-primary hover:text-light-accent-primary focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover transition-colors duration-200"
      >
        {{ t('footer.github') }}
      </a>
      <a
        [href]="links.linkedin"
        target="_blank"
        rel="noopener noreferrer"
        class="dark:text-dark-accent-hover text-light-accent-hover dark:hover:text-dark-accent-primary hover:text-light-accent-primary focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover transition-colors duration-200"
      >
        {{ t('footer.linkedin') }}
      </a>
      <a
        [href]="links.email"
        class="dark:text-dark-accent-hover text-light-accent-hover dark:hover:text-dark-accent-primary hover:text-light-accent-primary focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover transition-colors duration-200"
      >
        {{ t('footer.email') }}
      </a>
      <a
        [href]="links.resume"
        download="Muhammad-Alif-Budiman-Resume.pdf"
        class="dark:text-dark-accent-hover text-light-accent-hover dark:hover:text-dark-accent-primary hover:text-light-accent-primary focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover transition-colors duration-200"
      >
        {{ t('footer.resume') }}
      </a>
      <button
        type="button"
        (click)="scrollToTop()"
        class="dark:text-dark-accent-hover text-light-accent-hover dark:hover:text-dark-accent-primary hover:text-light-accent-primary focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover transition-colors duration-200"
        [attr.aria-label]="t('footer.backToTop')"
      >
        {{ t('footer.backToTop') }} ↑
      </button>
    </div>
  </div>
</footer>

<div id="section-experience" class="section-wrapper py-24">
  <div class="container">
    <div class="w-full px-4">
      <div class="mx-auto mb-12 max-w-xl text-center">
        <p class="dark:text-dark-accent-hover text-light-accent-hover font-mono text-base md:text-xl">{{ eyebrow }}</p>
        <h2 class="dark:text-dark-text-primary text-light-text-primary text-3xl font-bold md:text-4xl lg:text-5xl">{{ title }}</h2>
      </div>

      <div class="mx-auto max-w-3xl space-y-8">
        @for (exp of experiences; track exp.id) {
          <div class="dark:bg-dark-background-hover bg-light-background-hover rounded-xl p-6 shadow-md" [attr.data-testid]="'experience-card'">
            <div class="mb-1 grid grid-cols-1 gap-1 sm:grid-cols-[minmax(0,1fr)_auto] sm:items-start sm:gap-4">
              <div>
                <h3 class="dark:text-dark-text-primary text-light-text-primary text-xl font-semibold">{{ itemRole(exp.id) }}</h3>
                <p class="dark:text-dark-accent-hover text-light-accent-hover font-mono text-sm font-medium">{{ exp.company }}</p>
              </div>
              <div class="sm:text-right">
                <p class="dark:text-dark-text-secondary text-light-text-secondary whitespace-nowrap text-sm">{{ itemPeriod(exp.id) }}</p>
                <p class="dark:text-dark-text-secondary text-light-text-secondary text-sm">{{ itemLocation(exp.id) }}</p>
              </div>
            </div>
            <p class="dark:text-dark-text-secondary text-light-text-secondary mb-3 mt-2 text-base">{{ itemDescription(exp.id) }}</p>
            <ul class="dark:text-dark-text-secondary text-light-text-secondary list-disc space-y-1 pl-5 text-sm">
              @for (c of itemContributions(exp.id); track c) {
                <li>{{ c }}</li>
              }
            </ul>
          </div>
        }
      </div>
    </div>
  </div>
</div>

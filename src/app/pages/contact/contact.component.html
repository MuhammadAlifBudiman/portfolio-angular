<div [class.wrapper]="pageMode" [class.section-wrapper]="!pageMode" class="pt-24">
  <div class="mx-auto max-w-5xl px-4 lg:flex lg:items-start lg:gap-12">
    <div class="mb-10 lg:mb-0 lg:w-1/2">
    <div
      class="dark:text-dark-text-secondary text-light-text-secondary mb-5 text-center text-base"
    >
      <p
        id="section-contact"
        class="dark:text-dark-accent-hover text-light-accent-hover mb-1.5 w-full font-mono text-base md:text-xl"
      >
        {{ contactEyebrow }}
      </p>
      @if (pageMode) {
        <h1
          class="dark:text-dark-text-primary text-light-text-primary mb-1.5 text-3xl font-bold md:text-4xl lg:text-6xl"
        >
          {{ contactTitle }}
        </h1>
      } @else {
        <h2
          class="dark:text-dark-text-primary text-light-text-primary mb-1.5 text-3xl font-bold md:text-4xl lg:text-6xl"
        >
          {{ contactTitle }}
        </h2>
      }
      <div class="mt-4 flex flex-col items-center justify-center lg:items-start">
        <p
          class="dark:text-dark-text-secondary text-light-text-secondary mb-1 max-w-[500px] text-base lg:text-left"
        >
          {{ contactDescription }}
        </p>
        <p
          class="dark:text-dark-text-secondary text-light-text-secondary mb-5 text-center text-base lg:text-left"
        >
          {{ whatsappLabel }}
          <a
            [href]="'https://wa.me/' + phoneNumber"
            target="_blank"
            rel="noopener noreferrer"
            class="dark:text-dark-accent-hover text-light-accent-hover hover:underline"
            >{{ phoneNumber }}</a
          >
          <br />
          {{ emailLabel }}
          <a
            [href]="'mailto:' + email"
            class="dark:text-dark-accent-hover text-light-accent-hover hover:underline"
            >{{ email }}</a
          >
        </p>
      </div>
    </div>
    </div><!-- end left column -->

    <div class="lg:w-1/2">
    <form class="w-full" #contactForm>
      <input type="hidden" name="time" [value]="time" />
      <div class="mb-5">
        <label
          class="dark:text-dark-text-secondary text-light-text-secondary mb-2 block text-base"
          for="name"
          >{{ formNameLabel }}</label
        >
        <input
          class="dark:bg-dark-background-hover bg-light-background-hover dark:hover:border-dark-accent-primary hover:border-light-accent-primary dark:border-dark-accent-hover border-light-accent-hover dark:text-dark-text-secondary text-light-text-secondary w-full rounded-lg border border-solid p-2.5 text-base focus:outline-none focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover"
          type="text"
          id="name"
          name="name"
          maxlength="100"
          required
        />
      </div>
      <div class="mb-5">
        <label
          class="dark:text-dark-text-secondary text-light-text-secondary mb-2 block text-base"
          for="email"
          >{{ formEmailLabel }}</label
        >
        <input
          class="dark:bg-dark-background-hover bg-light-background-hover dark:hover:border-dark-accent-primary hover:border-light-accent-primary dark:border-dark-accent-hover border-light-accent-hover dark:text-dark-text-secondary text-light-text-secondary w-full rounded-lg border border-solid p-2.5 text-base focus:outline-none focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover"
          type="email"
          id="email"
          name="email"
          maxlength="100"
          required
        />
      </div>
      <div class="mb-5">
        <label
          class="dark:text-dark-text-secondary text-light-text-secondary mb-2 block text-base"
          for="title"
          >{{ formSubjectLabel }}</label
        >
        <input
          class="dark:bg-dark-background-hover bg-light-background-hover dark:hover:border-dark-accent-primary hover:border-light-accent-primary dark:border-dark-accent-hover border-light-accent-hover dark:text-dark-text-secondary text-light-text-secondary w-full rounded-lg border border-solid p-2.5 text-base focus:outline-none focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover"
          type="text"
          id="title"
          name="title"
          maxlength="100"
          required
        />
      </div>
      <div class="mb-5">
        <label
          class="dark:text-dark-text-secondary text-light-text-secondary mb-2 block text-base"
          for="message"
          >{{ formMessageLabel }}</label
        >
        <textarea
          class="dark:bg-dark-background-hover bg-light-background-hover dark:hover:border-dark-accent-primary hover:border-light-accent-primary dark:border-dark-accent-hover border-light-accent-hover dark:text-dark-text-secondary text-light-text-secondary h-[150px] w-full rounded-lg border border-solid p-2.5 text-base focus:outline-none focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover"
          name="message"
          id="message"
          rows="5"
          maxlength="2000"
          required
        ></textarea>
      </div>
      <div
        *ngIf="isLoading"
        role="status"
        aria-live="polite"
        class="dark:text-dark-accent-hover text-light-accent-hover mt-5 text-center text-base"
      >
        {{ formSendingLabel }}
      </div>
      <div
        *ngIf="alertMessage"
        role="alert"
        class="mt-5 rounded-md p-2.5 text-center text-base"
        [ngClass]="alertType"
      >
        {{ alertMessage }}
      </div>
      <div class="mb-4 flex w-full justify-center text-center">
        <app-button
          [buttonText]="formSendLabel"
          [buttonAction]="sendData"
          [disabled]="isLoading"
        ></app-button>
      </div>
    </form>
    </div><!-- end right column -->
  </div>
</div>

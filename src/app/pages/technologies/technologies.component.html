<section id="section-technologies" class="section-wrapper py-24 scroll-mt-20">
  <div class="container">
    <div class="w-full px-4">
      <div class="mx-auto mb-10 max-w-xl text-center">
        <p class="dark:text-dark-accent-hover text-light-accent-hover font-mono text-base md:text-xl">
          {{ eyebrow }}
        </p>
        <h2 class="dark:text-dark-text-primary text-light-text-primary text-3xl font-bold md:text-4xl lg:text-5xl">
          {{ title }}
        </h2>
      </div>

      <div class="mx-auto w-full max-w-6xl grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        @for (group of techGroups; track group.key) {
          <div
            class="dark:bg-dark-background-hover bg-light-background-hover dark:border-dark-border-primary border-light-border-primary rounded-xl border p-5 flex flex-col gap-3"
          >
            <h3 class="dark:text-dark-text-primary text-light-text-primary text-sm font-semibold uppercase tracking-widest font-mono">
              {{ groupLabel(group.key) }}
            </h3>

            <div class="flex flex-wrap gap-1.5">
              @for (tech of primaryItems(group); track $index) {
                <span
                  class="dark:bg-dark-background-primary bg-light-background-primary dark:text-dark-text-primary text-light-text-primary rounded-full px-2.5 py-1 font-mono text-xs"
                >
                  {{ tech }}
                </span>
              }
            </div>

            @if (additionalItems(group).length > 0) {
              <div class="flex flex-wrap gap-1.5 pt-1 border-t dark:border-dark-border-primary border-light-border-primary/50">
                @for (tech of additionalItems(group); track $index) {
                  <span
                    class="dark:text-dark-text-secondary text-light-text-secondary rounded-full px-2.5 py-1 font-mono text-xs opacity-75"
                  >
                    {{ tech }}
                  </span>
                }
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</section>

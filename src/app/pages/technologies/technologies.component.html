<section id="section-technologies" class="wrapper pt-24 scroll-mt-20">
  <div class="container">
    <div class="w-full px-4">
      <div class="mx-auto mb-10 max-w-xl text-center">
        <p class="dark:text-dark-accent-hover text-light-accent-hover font-mono text-base md:text-xl">
          {{ eyebrow }}
        </p>
        <h2 class="dark:text-dark-text-primary text-light-text-primary text-3xl font-bold md:text-4xl lg:text-5xl">
          {{ title }}
        </h2>
      </div>

      <div class="mx-auto w-full max-w-4xl">
        @for (group of techGroups; track group.key) {
          <div class="mb-8">
            <h3 class="dark:text-dark-text-secondary text-light-text-secondary mb-3 text-sm font-semibold uppercase tracking-widest font-mono">
              {{ groupLabel(group.key) }}
            </h3>
            <div class="flex flex-wrap gap-2">
              @for (tech of group.items; track tech) {
                <span
                  class="dark:bg-dark-background-hover bg-light-background-hover dark:text-dark-text-primary text-light-text-primary rounded-full px-3 py-1 font-mono text-sm"
                >
                  {{ tech }}
                </span>
              }
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>

<div class="wrapper pt-36">
  <div class="mx-auto w-full max-w-[1280px] px-6">
    <div
      data-testid="intro-layout"
      class="grid w-full items-center gap-8 lg:grid-cols-2 lg:gap-12"
    >
      <div class="w-full max-w-[720px]">
        <p
          class="dark:text-dark-accent-hover text-light-accent-hover lg:max-w-[550px] mb-1.5 font-mono text-base md:text-xl"
        >
          {{ greetingText }}
        </p>
        <h1
          class="dark:text-dark-text-primary text-light-text-primary mb-1.5 text-3xl font-bold md:text-4xl lg:text-6xl"
        >
          {{ fullName }}
        </h1>
        <h2
          class="dark:text-dark-text-secondary text-light-text-secondary mb-1.5 text-3xl font-bold md:text-4xl lg:text-6xl"
          id="my-role"
        >
          {{ roleText }}
        </h2>
        <p class="lg:max-w-[550px] mb-1.5 mt-4">
          {{ introductionText }}
        </p>
        <p class="dark:text-dark-text-secondary text-light-text-secondary lg:max-w-[550px] mb-4 mt-2 font-mono text-sm">
          {{ availabilityText }} · {{ locationText }}
        </p>
        <div class="flex flex-wrap gap-3">
          <app-button
            [href]="'#section-portfolio'"
            [buttonText]="viewProjectsText"
            [ariaLabel]="viewProjectsText"
          ></app-button>
          <app-button
            href="resume.pdf"
            [buttonText]="downloadResumeText"
            download="Muhammad-Alif-Budiman-Resume.pdf"
            [ariaLabel]="downloadResumeText"
          ></app-button>
        </div>
      </div>

      <aside
        [attr.aria-label]="profileTitle"
        class="dark:border-dark-border-primary border-light-border-primary dark:bg-dark-background-hover bg-light-background-hover w-full rounded-lg border p-5 lg:ml-auto lg:max-w-[420px]"
      >
        <h3 class="dark:text-dark-text-primary text-light-text-primary mb-4 text-lg font-bold">
          {{ profileTitle }}
        </h3>
        <dl class="grid grid-cols-2 gap-3">
          @for (fact of quickFacts; track fact.label) {
            <div
              class="dark:bg-dark-background-primary bg-light-background-primary dark:border-dark-border-primary border-light-border-primary rounded-lg border p-4 flex flex-col gap-1"
            >
              @if (fact.count !== null) {
                <dd class="dark:text-dark-accent-primary text-light-accent-primary text-3xl font-bold leading-none">{{ fact.count }}</dd>
              } @else {
                <dd class="dark:text-dark-accent-primary text-light-accent-primary text-sm font-semibold font-mono leading-snug">{{ fact.value }}</dd>
              }
              <dt class="dark:text-dark-text-secondary text-light-text-secondary font-mono text-xs leading-snug">{{ fact.label }}</dt>
            </div>
          }
        </dl>
      </aside>
    </div>
  </div>
</div>

<div class="wrapper pt-36">
  <div class="container">
    <div class="w-full px-4">
      <div class="mx-auto mb-16 max-w-xl text-center">
        <div>
          <p
            id="section-portfolio"
            class="dark:text-dark-accent-hover text-light-accent-hover font-mono text-base md:text-xl"
          >
            {{ portfolioEyebrow }}
          </p>
          <h1
            class="dark:text-dark-text-primary text-light-text-primary text-3xl font-bold md:text-4xl lg:min-w-[610px] lg:text-6xl"
          >
            {{ portfolioTitle }}
          </h1>
        </div>
      </div>

      <div class="flex w-full flex-wrap justify-center xl:mx-auto xl:w-10/12">
        @for (project of projects; track project.id) {
          <div
            class="mb-12 flex flex-col p-4 md:w-1/2"
            [id]="project.id"
            data-testid="project-card"
          >
            <div class="shadow-md">
              <img
                [src]="project.imageSrc"
                [alt]="projectImageAlt(project.id)"
                loading="lazy"
                height="222"
                class="z-2 dark:border-dark-text-primary border-light-text-primary dark:hover:border-dark-accent-primary hover:border-light-accent-primary dark:hover:bg-dark-background-hover hover:bg-light-background-hover h-[222px] w-full rounded-lg border-2 object-cover"
              />
            </div>
            <div class="flex h-full flex-col">
              <p
                class="dark:text-dark-accent-hover text-light-accent-hover mt-2 font-mono text-base md:text-xl"
              >
                {{ ownershipLabel(project.ownership) }}
              </p>
              <h2
                class="dark:text-dark-text-primary text-light-text-primary mb-2.5 text-4xl"
              >
                {{ project.title }}
              </h2>
              <p
                class="dark:text-dark-text-secondary text-light-text-secondary mb-2.5 block flex-1 text-lg"
              >
                {{ projectDescription(project.id) }}
              </p>
              <app-button
                [buttonText]="viewProjectBtn"
                [buttonAction]="openWebsite(project.url)"
              ></app-button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</div>

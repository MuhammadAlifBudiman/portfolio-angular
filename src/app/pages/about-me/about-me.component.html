<div [class.wrapper]="pageMode" [class.section-wrapper]="!pageMode" class="pt-24 pb-16">
  <div class="container">
    <div class="flex flex-wrap justify-center">
      <div class="w-full px-4 lg:w-1/2">
        <p
          id="section-about"
          class="dark:text-dark-accent-hover text-light-accent-hover mb-1.5 w-full font-mono text-base md:text-xl lg:max-w-[550px] scroll-mt-20 flex flex-wrap items-center gap-2"
        >
          <span>{{ introductionText }}</span>
        </p>
        @if (pageMode) {
          <h1
            class="dark:text-dark-text-primary text-light-text-primary mb-1.5 text-3xl font-bold md:text-4xl lg:text-6xl"
          >
            {{ sectionTitle }}
          </h1>
        } @else {
          <h2
            class="dark:text-dark-text-primary text-light-text-primary mb-1.5 text-3xl font-bold md:text-4xl lg:text-6xl"
          >
            {{ sectionTitle }}
          </h2>
        }
        <p class="mb-1.5 mt-4 w-full lg:max-w-[550px]">
          {{ aboutMeParagraph1 }}
        </p>
        <p class="mb-1.5 mt-4 w-full lg:max-w-[550px]">
          {{ aboutMeParagraph2 }}
        </p>
        <p class="mb-1.5 mt-4 w-full lg:max-w-[550px]">
          {{ aboutMeParagraph3 }}
        </p>
        <div class="flex flex-wrap gap-x-4 gap-y-2">
          <app-button
            [buttonText]="buttonText"
            href="/portfolio"
            [ariaLabel]="buttonText"
          ></app-button>
          <app-button
            [buttonText]="resumeButtonText"
            [href]="resumeHref"
            [download]="resumeDownloadName"
            [ariaLabel]="resumeButtonText"
          ></app-button>
        </div>
      </div>
      <div class="relative mt-10 px-4 lg:mt-9">
        <img
          src="my-photo.png"
          [alt]="photoAlt"
          loading="lazy"
          width="320"
          height="320"
          class="z-2 dark:border-dark-text-primary border-light-text-primary dark:hover:border-dark-accent-primary hover:border-light-accent-primary dark:hover:bg-dark-background-hover hover:bg-light-background-hover block h-[min(320px,calc(100vw-4rem))] w-[min(320px,calc(100vw-4rem))] rounded-lg border-2 border-solid object-cover object-top"
        />
        <div
          aria-hidden="true"
          class="dark:border-dark-text-primary border-light-text-primary z-1 dark:border-b-dark-text-secondary border-b-light-text-secondary dark:border-r-dark-text-secondary border-r-light-text-secondary pointer-events-none absolute left-6 top-6 h-[min(320px,calc(100vw-4rem))] w-[min(320px,calc(100vw-4rem))] rounded-xl border-b-2 border-r-2 border-solid"
        ></div>
        <div class="mt-8 flex items-center">
          <a
            href="https://github.com/MuhammadAlifBudiman"
            target="_blank"
            rel="noopener noreferrer"
            class="dark:border-dark-accent-primary border-light-accent-primary dark:text-dark-accent-primary text-light-accent-primary dark:hover:border-dark-accent-hover hover:border-light-accent-hover dark:hover:text-dark-accent-hover hover:text-light-accent-hover focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover mr-3 flex h-9 w-9 items-center justify-center rounded-full border"
          >
            <svg
              role="img"
              aria-labelledby="icon-github"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              class="fill-current"
            >
              <title id="icon-github">GitHub</title>

                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
              />
            </svg>
          </a>

          <!-- linkedin -->
          <a
            href="https://www.linkedin.com/in/muhammad-alif-budiman/"
            target="_blank"
            rel="noopener noreferrer"
            class="dark:border-dark-accent-primary border-light-accent-primary dark:text-dark-accent-primary text-light-accent-primary dark:hover:border-dark-accent-hover hover:border-light-accent-hover dark:hover:text-dark-accent-hover hover:text-light-accent-hover focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover mr-3 flex h-9 w-9 items-center justify-center rounded-full border"
          >
            <svg

              aria-labelledby="icon-linkedin"
              width="20"
              class="fill-current"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"

              />
            </svg>
          </a>

          <!-- email -->
          <a
            href="mailto:alifm2101@gmail.com"
            class="dark:border-dark-accent-primary border-light-accent-primary dark:text-dark-accent-primary text-light-accent-primary dark:hover:border-dark-accent-hover hover:border-light-accent-hover dark:hover:text-dark-accent-hover hover:text-light-accent-hover focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-light-accent-hover dark:focus-visible:outline-dark-accent-hover mr-3 flex h-9 w-9 items-center justify-center rounded-full border"
          >
            <svg

              aria-labelledby="icon-gmail"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              class="fill-current"

              <path

          >
            <svg
              role="img"
              aria-labelledby="icon-whatsapp"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              class="fill-current"
            >
              <title id="icon-whatsapp">WhatsApp</title>
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

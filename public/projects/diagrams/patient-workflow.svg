<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Patient Management System workflow: Patient registers, joins queue, doctor calls patient, doctor records consultation, admin exports CSV report">
  <title>Patient Management System — Core Workflow</title>
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', monospace; fill: #e2e8f0; font-size: 12px; }
    .box { fill: #1e293b; stroke: #334155; stroke-width: 1.5; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arr4); }
    .label { fill: #64748b; font-size: 10px; }
    .actor-p { fill: #1e3a5f; stroke: #2563eb; stroke-width: 1.5; }
    .actor-d { fill: #14532d; stroke: #16a34a; stroke-width: 1.5; }
    .actor-a { fill: #2e1065; stroke: #7c3aed; stroke-width: 1.5; }
    .note { fill: #0f172a; stroke: #1e293b; stroke-width: 1; }
  </style>
  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="600" height="300" fill="#0f172a" rx="8"/>
  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#cbd5e1">Patient Management — Core Workflow</text>

  <!-- Actors -->
  <rect x="30" y="48" width="80" height="28" rx="4" class="actor-p"/>
  <text x="70" y="66" text-anchor="middle" font-size="11" fill="#93c5fd">Patient</text>

  <rect x="250" y="48" width="100" height="28" rx="4" class="actor-d"/>
  <text x="300" y="66" text-anchor="middle" font-size="11" fill="#86efac">Doctor / Staff</text>

  <rect x="490" y="48" width="80" height="28" rx="4" class="actor-a"/>
  <text x="530" y="66" text-anchor="middle" font-size="11" fill="#c4b5fd">Admin</text>

  <!-- Lifelines -->
  <line x1="70" y1="76" x2="70" y2="270" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="300" y1="76" x2="300" y2="270" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="530" y1="76" x2="530" y2="270" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: Patient registers -->
  <rect x="30" y="95" width="120" height="26" rx="4" class="box"/>
  <text x="90" y="112" text-anchor="middle" font-size="11">Register / Check-in</text>
  <line x1="150" y1="108" x2="268" y2="108" class="arrow"/>
  <text x="209" y="104" class="label" text-anchor="middle">queued</text>

  <!-- Step 2: Queue management -->
  <rect x="240" y="138" width="120" height="26" rx="4" class="box"/>
  <text x="300" y="155" text-anchor="middle" font-size="11">Manage Queue</text>
  <line x1="300" y1="164" x2="300" y2="180" class="arrow"/>

  <!-- Step 3: Call patient -->
  <rect x="240" y="180" width="120" height="26" rx="4" class="box"/>
  <text x="300" y="197" text-anchor="middle" font-size="11">Call Patient</text>
  <line x1="240" y1="193" x2="152" y2="193" class="arrow"/>
  <text x="196" y="189" class="label" text-anchor="middle">notified</text>

  <!-- Step 4: Consultation -->
  <rect x="240" y="220" width="120" height="26" rx="4" class="actor-d"/>
  <text x="300" y="237" text-anchor="middle" font-size="11" fill="#86efac">Record Consultation</text>
  <line x1="360" y1="233" x2="480" y2="233" class="arrow"/>

  <!-- Step 5: Admin export -->
  <rect x="485" y="220" width="90" height="26" rx="4" class="actor-a"/>
  <text x="530" y="237" text-anchor="middle" font-size="11" fill="#c4b5fd">Export CSV</text>

  <!-- Stack footer -->
  <text x="300" y="282" text-anchor="middle" class="label">Python · Flask · MongoDB · AJAX · HTML · CSS · JavaScript</text>
</svg>

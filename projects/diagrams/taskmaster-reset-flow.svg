<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Task Master recurring task reset flow: Cron or management command triggers reset check, daily/weekly/monthly tasks evaluated by due date, overdue tasks reset to pending, reset logged">
  <title>Task Master — Recurring Task Reset Flow</title>
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', monospace; fill: #1e293b; font-size: 12px; }
    .box { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; }
    .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#arr5); }
    .label { fill: #475569; font-size: 10px; }
    .trigger { fill: #fafaf9; stroke: #a8a29e; stroke-width: 1.5; }
    .check { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .reset { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .log { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.5; }
    .skip { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1; }
  </style>
  <defs>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Task Master — Recurring Task Reset Flow</text>

  <!-- Trigger -->
  <rect x="200" y="42" width="200" height="30" rx="6" class="trigger"/>
  <text x="300" y="61" text-anchor="middle" fill="#57534e">Cron / Management Command</text>

  <line x1="300" y1="72" x2="300" y2="92" class="arrow"/>

  <!-- Timezone check -->
  <rect x="170" y="92" width="260" height="30" rx="6" class="check"/>
  <text x="300" y="111" text-anchor="middle" fill="#1d4ed8">Evaluate Task Due Dates (timezone-aware)</text>

  <line x1="300" y1="122" x2="300" y2="142" class="arrow"/>

  <!-- Type branches -->
  <rect x="30" y="142" width="130" height="28" rx="5" class="box"/>
  <text x="95" y="160" text-anchor="middle" font-size="11">Daily Tasks</text>

  <rect x="235" y="142" width="130" height="28" rx="5" class="box"/>
  <text x="300" y="160" text-anchor="middle" font-size="11">Weekly Tasks</text>

  <rect x="440" y="142" width="130" height="28" rx="5" class="box"/>
  <text x="505" y="160" text-anchor="middle" font-size="11">Monthly Tasks</text>

  <!-- Branch arrows from check -->
  <line x1="225" y1="122" x2="95" y2="142" class="arrow"/>
  <line x1="300" y1="122" x2="300" y2="142" class="arrow"/>
  <line x1="375" y1="122" x2="505" y2="142" class="arrow"/>

  <!-- Merge to reset -->
  <line x1="95" y1="170" x2="95" y2="210" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="300" y1="170" x2="300" y2="210" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="505" y1="170" x2="505" y2="210" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="95" y1="210" x2="505" y2="210" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="300" y1="210" x2="300" y2="220" class="arrow"/>

  <!-- Reset -->
  <rect x="180" y="220" width="240" height="30" rx="6" class="reset"/>
  <text x="300" y="239" text-anchor="middle" fill="#15803d">Reset Overdue Tasks → Pending</text>

  <line x1="300" y1="250" x2="300" y2="268" class="arrow"/>

  <!-- Log -->
  <rect x="200" y="268" width="200" height="24" rx="4" class="log"/>
  <text x="300" y="284" text-anchor="middle" font-size="11" fill="#6d28d9">Log Reset Event</text>

  <!-- Stack footer -->
  <text x="300" y="298" text-anchor="middle" class="label">Django · DRF · PostgreSQL · JWT · drf-yasg · openpyxl</text>
</svg>
